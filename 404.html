<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Stackly Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --blue-gradient: linear-gradient(135deg,#3a7f53,#092009);
    --dark-bg:#05070d;
    --white:#ffffff;
    --accent:#3a7f53;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--dark-bg);
    color:var(--white);
    overflow-x:hidden;
}


html, body{
    height:100%;
    overflow:hidden;
}
/* HEADER STYLE (Same as your design) */
.header{
    display:flex;
    align-items:center;
    background:var(--dark-bg);
}

.logo-section{
    background:var(--blue-gradient);
    padding:25px 60px 25px 20px;
    clip-path:polygon(0 0, 85% 0, 100% 50%, 85% 100%, 0 100%);
}

.logo{
    font-size:30px;
    font-weight:700;
    color:var(--white);
    letter-spacing:2px;
}

/* 404 SECTION */
.error-section{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0px;
    position:relative;
}

/* Animated Glow Background */
.error-section::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,var(--accent),transparent 70%);
    opacity:0.15;
    animation:rotateGlow 12s linear infinite;
}

@keyframes rotateGlow{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.error-content{
    position:relative;
    z-index:2;
}

/* 404 Number */
.error-code{
    font-size:150px;
    font-weight:700;
    background:var(--blue-gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

h2{
    margin:20px 0 10px;
    font-size:32px;
}

p{
    color:#cbd5e1;
    margin-bottom:30px;
}

/* Button */
.btn{
    display:inline-block;
    padding:12px 30px;
    background:var(--blue-gradient);
    color:var(--white);
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    transition:0.4s;
}

.btn:hover{
    background:var(--white);
    color:#4338ca;
    transform:translateY(-3px);
}

/* Responsive */
@media(max-width:768px){
    .error-code{
        font-size:90px;
    }
    h2{
        font-size:22px;
    }
}

.logo a{
    display:inline-block;
}

.logo img{
    width:170px;
    height:auto;
    display:block;
}


</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo-section">
<div class="logo">
    <a href="index.html">
        <img src="assets/images/home1/resources/logo.webp" alt="Stackly Logo">
    </a>
</div>
    </div>
</header>

<!-- 404 CONTENT -->
<section class="error-section">
    <div class="error-content">
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>
            The page you are looking for might have been removed, 
            renamed, or is temporarily unavailable.
        </p>
        <a href="index.html" class="btn">Return to Home</a>
    </div>
</section>

</body>
</html>
