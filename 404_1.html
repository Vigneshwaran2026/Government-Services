<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Service Not Found</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"DM Sans",sans-serif;
}

body{
height:100vh;
background:#0c1222;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:#fff;
}

/* Background Animation */

.background{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.background span{
position:absolute;
display:block;
width:6px;
height:6px;
background:#3a7f53;
border-radius:50%;
animation:animate 20s linear infinite;
opacity:0.7;
}

.background span:nth-child(1){left:10%;animation-duration:18s}
.background span:nth-child(2){left:20%;animation-duration:22s}
.background span:nth-child(3){left:30%;animation-duration:16s}
.background span:nth-child(4){left:40%;animation-duration:20s}
.background span:nth-child(5){left:60%;animation-duration:25s}
.background span:nth-child(6){left:70%;animation-duration:19s}
.background span:nth-child(7){left:80%;animation-duration:23s}
.background span:nth-child(8){left:90%;animation-duration:17s}

@keyframes animate{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* Main container */

.error-container{
text-align:center;
position:relative;
z-index:10;
}

/* Logo */

.logo img{
width:180px;
margin-bottom:30px;
}

/* 404 text */

.error-code{
font-size:130px;
font-weight:800;
color:#3a7f53;
animation:float 3s ease-in-out infinite;
}

/* Text */

.error-title{
font-size:30px;
font-weight:700;
margin-top:-10px;
}

.error-text{
color:#aab3c5;
margin:15px 0 35px;
}

/* Button */

.home-btn{
display:inline-block;
padding:14px 35px;
background:linear-gradient(135deg,#3a7f53,#3a7f53);
color:#fff;
text-decoration:none;
font-weight:600;
border-radius:8px;
transition:0.3s;
}

.home-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(73,70,236,0.4);
}

/* Floating animation */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

</style>

</head>

<body>

<!-- Animated Background -->
<div class="background">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="error-container">

<div class="logo">
<img src="assets/images/home1/resources/logo.webp" alt="Logo">
</div>


<div class="error-code">404</div>

<div class="error-title">
Government Service Not Found
</div>

<p class="error-text">
The service you are looking for might have been removed,<br>
renamed, or temporarily unavailable.
</p>

<a href="index2.html" class="home-btn">
Back to Home
</a>

</div>

</body>
</html>
